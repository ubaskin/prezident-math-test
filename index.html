<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matematika Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: var(--tg-theme-bg-color, #fff);
  --text: var(--tg-theme-text-color, #000);
  --hint: var(--tg-theme-hint-color, #999);
  --btn: var(--tg-theme-button-color, #3390ec);
  --btn-text: var(--tg-theme-button-text-color, #fff);
  --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
}

.screen { display: none; }
.screen.active { display: block; }

#start-screen {
  text-align: center;
  padding-top: 40px;
}

#start-screen h1 {
  font-size: 24px;
  margin-bottom: 8px;
}

#start-screen p {
  color: var(--hint);
  margin-bottom: 24px;
  line-height: 1.5;
}

.stat-row {
  display: flex;
  justify-content: space-around;
  margin: 24px 0;
}

.stat-box {
  text-align: center;
}

.stat-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--btn);
}

.stat-label {
  font-size: 12px;
  color: var(--hint);
  margin-top: 4px;
}

.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: var(--btn);
  color: var(--btn-text);
  margin-top: 16px;
}

.btn:active { opacity: 0.8; }

#progress-bar {
  height: 4px;
  background: var(--secondary-bg);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}

#progress-fill {
  height: 100%;
  background: var(--btn);
  transition: width 0.3s;
  width: 0%;
}

#question-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

#q-number {
  font-size: 14px;
  color: var(--hint);
}

#q-timer {
  font-size: 14px;
  font-weight: 600;
  color: var(--hint);
}

#q-difficulty {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 12px;
}

.diff-1 { background: #e8f5e9; color: #2e7d32; }
.diff-2 { background: #fff3e0; color: #ef6c00; }
.diff-3 { background: #fff3e0; color: #e65100; }
.diff-4 { background: #ffebee; color: #c62828; }

#q-text {
  font-size: 18px;
  line-height: 1.6;
  margin-bottom: 20px;
  font-weight: 500;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--secondary-bg);
  border-radius: 12px;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}

.option-btn:active { transform: scale(0.98); }

.option-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--secondary-bg);
  font-weight: 700;
  font-size: 14px;
  margin-right: 12px;
  flex-shrink: 0;
}

.option-btn.selected {
  border-color: var(--btn);
  background: color-mix(in srgb, var(--btn) 10%, var(--bg));
}

.option-btn.selected .option-letter {
  background: var(--btn);
  color: var(--btn-text);
}

.option-btn.correct-answer {
  border-color: #4caf50;
  background: #e8f5e9;
}

.option-btn.wrong-answer {
  border-color: #f44336;
  background: #ffebee;
}

#result-screen {
  text-align: center;
  padding-top: 20px;
}

.result-score {
  font-size: 48px;
  font-weight: 700;
  color: var(--btn);
}

.result-label {
  color: var(--hint);
  margin-bottom: 24px;
}

.topic-list {
  text-align: left;
  margin: 16px 0;
}

.topic-item {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--secondary-bg);
}

.topic-status {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-right: 12px;
  flex-shrink: 0;
}

.topic-status.qizil { background: #f44336; }
.topic-status.sariq { background: #ff9800; }
.topic-status.yashil { background: #4caf50; }

.topic-name { flex: 1; font-size: 14px; }
.topic-pct { font-size: 14px; font-weight: 600; color: var(--hint); }
</style>
</head>
<body>

<div id="start-screen" class="screen active">
  <h1>📐 Matematika Test</h1>
  <p>Prezident Maktabi imtihoniga tayyorgarlik<br>45 mavzu · 180 savol · 4 daraja</p>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="total-questions">180</div>
      <div class="stat-label">savol</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">45</div>
      <div class="stat-label">mavzu</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">⏱</div>
      <div class="stat-label">vaqt o'lchanadi</div>
    </div>
  </div>
  <button class="btn" onclick="startTest()">Testni boshlash</button>
</div>

<div id="test-screen" class="screen">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="question-header">
    <span id="q-number"></span>
    <span id="q-timer">0:00</span>
  </div>
  <div id="q-difficulty"></div>
  <div id="q-text"></div>
  <div class="options" id="options-container"></div>
</div>

<div id="result-screen" class="screen">
  <div class="result-score" id="result-score"></div>
  <div class="result-label">to'g'ri javob</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="r-time">0</div>
      <div class="stat-label">o'rtacha vaqt (sek)</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="r-percent">0%</div>
      <div class="stat-label">foiz</div>
    </div>
  </div>
  <h3 style="text-align:left; margin: 16px 0 8px;">Mavzular profili</h3>
  <div class="topic-list" id="topic-list"></div>
  <button class="btn" onclick="sendResults()">Natijani yuborish</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let questions = [];
let currentIndex = 0;
let responses = [];
let questionStartTime = 0;
let timerInterval = null;

async function loadQuestions() {
  const resp = await fetch('./questions.json');
  const data = await resp.json();
  questions = data.questions;
  document.getElementById('total-questions').textContent = questions.length;
}

loadQuestions();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest() {
  currentIndex = 0;
  responses = [];
  showScreen('test-screen');
  showQuestion();
}

function showQuestion() {
  if (currentIndex >= questions.length) {
    finishTest();
    return;
  }

  const q = questions[currentIndex];
  const diffLabels = {1: 'Oson', 2: "O'rta 1", 3: "O'rta 2", 4: 'Qiyin'};

  document.getElementById('q-number').textContent =
    `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width =
    `${((currentIndex) / questions.length) * 100}%`;

  const diffEl = document.getElementById('q-difficulty');
  diffEl.textContent = diffLabels[q.difficulty] || '?';
  diffEl.className = `diff-${q.difficulty}`;

  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  for (const letter of letters) {
    if (!q.options[letter]) continue;
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letter}</span><span>${q.options[letter]}</span>`;
    btn.onclick = () => selectAnswer(letter);
    container.appendChild(btn);
  }

  questionStartTime = performance.now();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  const timerEl = document.getElementById('q-timer');
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((performance.now() - questionStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 200);
}

function selectAnswer(letter) {
  clearInterval(timerInterval);
  const timeMs = performance.now() - questionStartTime;
  const timeSec = Math.round(timeMs / 100) / 10;
  const q = questions[currentIndex];

  const isCorrect = letter === q.correct;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.onclick = null;
    const btnLetter = ['A','B','C','D'][i];
    if (btnLetter === q.correct) btn.classList.add('correct-answer');
    if (btnLetter === letter && !isCorrect) btn.classList.add('wrong-answer');
    if (btnLetter === letter) btn.classList.add('selected');
  });

  responses.push({
    question_id: q.id,
    lesson_id: q.lesson_id,
    topic_group_id: q.topic_group_id,
    topic_group: q.topic_group,
    answer: letter,
    correct: isCorrect,
    time_sec: timeSec,
    expected_time: q.expected_time_sec,
    difficulty: q.difficulty,
  });

  setTimeout(() => {
    currentIndex++;
    showQuestion();
  }, 800);
}

function finishTest() {
  showScreen('result-screen');

  const correct = responses.filter(r => r.correct).length;
  const total = responses.length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const avgTime = total > 0
    ? (responses.reduce((s, r) => s + r.time_sec, 0) / total).toFixed(1)
    : 0;

  document.getElementById('result-score').textContent = `${correct}/${total}`;
  document.getElementById('r-time').textContent = avgTime;
  document.getElementById('r-percent').textContent = `${pct}%`;

  const byTopic = {};
  for (const r of responses) {
    if (!byTopic[r.topic_group_id]) {
      byTopic[r.topic_group_id] = { name: r.topic_group, correct: 0, total: 0, time: 0 };
    }
    byTopic[r.topic_group_id].total++;
    byTopic[r.topic_group_id].time += r.time_sec;
    if (r.correct) byTopic[r.topic_group_id].correct++;
  }

  const listEl = document.getElementById('topic-list');
  listEl.innerHTML = '';
  for (const [tid, t] of Object.entries(byTopic).sort((a, b) => a[0] - b[0])) {
    const p = Math.round((t.correct / t.total) * 100);
    const avgT = t.time / t.total;
    let status = 'qizil';
    if (p >= 75 && avgT <= 60) status = 'yashil';
    else if (p >= 50) status = 'sariq';

    const item = document.createElement('div');
    item.className = 'topic-item';
    item.innerHTML = `
      <div class="topic-status ${status}"></div>
      <div class="topic-name">${t.name}</div>
      <div class="topic-pct">${p}%</div>
    `;
    listEl.appendChild(item);
  }
}

function sendResults() {
  tg.sendData(JSON.stringify({ responses }));
}
</script>
</body>
</html>
